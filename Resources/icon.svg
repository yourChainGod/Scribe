<?xml version="1.0" encoding="UTF-8"?>
<!--
  Scribe app icon v3 — paper-and-pen with small-size legibility.
  
  v2 worked at 128pt+ but lost the pen entirely at 16pt because
  the pen body sat inside a low-contrast zone (slate-gray on a
  blue-shadow region of the paper). v3 keeps the same paper-and-
  pen language but ranks the elements for legibility:
  
    Tier 1 (visible at 16pt)
      Background squircle, paper silhouette, pen silhouette.
    
    Tier 2 (visible at 32pt)
      Heading bar on paper, pen nib (gold), pen tail (amber).
    
    Tier 3 (visible at 64pt+)
      Body text rows, caret, gradient detail on paper / pen.
  
  Concrete changes from v2:
    - Paper enlarged 560x680 -> 600x720 so it fills more of the
      icon plate at small sizes.
    - Pen rotated less aggressively (30 -> 22 degrees) so its
      silhouette reads as "an angled instrument" not "a diagonal
      streak".
    - Pen tail cap: black -> gold/amber so the pen's two ends
      both pop on the blue background. Used to be charcoal +
      gold, now gold + gold so a 16x16 viewer reads "two warm
      points connected by a dark line".
    - Pen body width 44 -> 52 so the silhouette doesn't vanish
      at 16pt.
    - Text rows reduced from 8 to 5 (one paragraph). Eight rows
      at 32pt blurred into a grey rectangle anyway.
    - Pen positioned so the tail extends beyond the paper edge
      — gives the pen its own outline against the blue
      background instead of being trapped in white space.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background: Apple Notes blue, vertical -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#60A5FA"/>
      <stop offset="0.5" stop-color="#3B82F6"/>
      <stop offset="1"   stop-color="#1D4ED8"/>
    </linearGradient>

    <!-- Top "lit-from-above" highlight -->
    <linearGradient id="highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="white" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Paper (off-white -> very light grey) -->
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>

    <!-- Pen body (slate-700 -> slate-900) -->
    <linearGradient id="penBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>

    <!-- Pen nib (gold -> bronze) -->
    <linearGradient id="nib" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FCD34D"/>
      <stop offset="1" stop-color="#B45309"/>
    </linearGradient>

    <!-- Pen tail cap (warm gold -> amber so it's visible at 16pt) -->
    <linearGradient id="tail" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>

    <!-- Drop shadow under paper -->
    <filter id="paperShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="14"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.30"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow under pen -->
    <filter id="penShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
      <feOffset dx="0" dy="12"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.50"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background squircle -->
  <rect x="48" y="48" width="928" height="928" rx="208" ry="208" fill="url(#bg)"/>
  <rect x="48" y="48" width="928" height="464" rx="208" ry="208" fill="url(#highlight)"/>

  <!-- Paper card, tilted -3 degrees and slightly off-center -->
  <g transform="translate(490 512) rotate(-3)" filter="url(#paperShadow)">
    <rect x="-300" y="-360" width="600" height="720" rx="36" ry="36" fill="url(#paper)"/>

    <!-- Heading -->
    <rect x="-240" y="-280" width="340" height="24" rx="12" ry="12" fill="#1E40AF"/>

    <!-- Body lines -->
    <rect x="-240" y="-210" width="500" height="18" rx="9" ry="9" fill="#94A3B8"/>
    <rect x="-240" y="-170" width="430" height="18" rx="9" ry="9" fill="#94A3B8"/>
    <rect x="-240" y="-130" width="470" height="18" rx="9" ry="9" fill="#94A3B8"/>
    <rect x="-240" y="-90"  width="320" height="18" rx="9" ry="9" fill="#94A3B8"/>

    <!-- Sub-heading -->
    <rect x="-240" y="0" width="260" height="24" rx="12" ry="12" fill="#1E40AF"/>

    <!-- Body lines (paragraph 2) -->
    <rect x="-240" y="70"  width="500" height="18" rx="9" ry="9" fill="#94A3B8"/>
    <rect x="-240" y="110" width="430" height="18" rx="9" ry="9" fill="#94A3B8"/>
    <rect x="-240" y="150" width="270" height="18" rx="9" ry="9" fill="#94A3B8"/>

    <!-- Caret indicating live edit -->
    <rect x="40" y="143" width="6" height="32" rx="3" ry="3" fill="#1D4ED8"/>
  </g>

  <!-- Pen, rotated 22 degrees, tail extending past the paper edge.
       Position chosen so the pen crosses the bottom-right corner of
       the paper so it reads as "writing on the page". -->
  <g transform="translate(640 720) rotate(22)" filter="url(#penShadow)">
    <!-- Body -->
    <rect x="-340" y="-26" width="380" height="52" rx="12" ry="12" fill="url(#penBody)"/>
    <!-- Body highlight strip (top half) -->
    <rect x="-340" y="-26" width="380" height="18" rx="9" ry="9" fill="white" opacity="0.20"/>
    <!-- Body grip groove -->
    <rect x="-40" y="-26" width="60" height="52" fill="black" opacity="0.18"/>
    <!-- Tail cap -->
    <circle cx="-340" cy="0" r="26" fill="url(#tail)"/>
    <circle cx="-340" cy="0" r="10" fill="#7C2D12" opacity="0.55"/>
    <!-- Nib (gold triangle) -->
    <polygon points="40,-26 130,0 40,26" fill="url(#nib)"/>
    <!-- Nib slit -->
    <rect x="40" y="-3" width="80" height="6" rx="2" ry="2" fill="#7C2D12" opacity="0.7"/>
    <!-- Nib reservoir hole -->
    <circle cx="62" cy="0" r="6" fill="#7C2D12" opacity="0.6"/>
  </g>
</svg>
