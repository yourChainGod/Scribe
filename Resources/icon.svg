<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5AC8FA"/>
      <stop offset="1" stop-color="#007AFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rounded square (macOS app shape, ~22% radius) -->
  <rect x="48" y="48" width="928" height="928" rx="208" ry="208" fill="url(#bg)"/>
  <!-- Subtle inner highlight -->
  <rect x="48" y="48" width="928" height="464" rx="208" ry="208" fill="white" opacity="0.10"/>
  <!-- Pencil mark -->
  <g transform="translate(512 512)" filter="url(#shadow)">
    <!-- Stylized "S" with serif feel; pencil-like terminator -->
    <path d="M -150 -210
             C -150 -300, -10 -310, 90 -270
             L 70 -190
             C -10 -240, -80 -230, -80 -180
             C -80 -130, 30 -100, 100 -50
             C 200 20, 220 90, 200 160
             C 170 250, 30 280, -130 240
             L -110 160
             C -10 200, 90 200, 110 160
             C 130 110, 30 80, -50 30
             C -130 -20, -150 -130, -150 -210 Z"
          fill="white"/>
  </g>
</svg>
